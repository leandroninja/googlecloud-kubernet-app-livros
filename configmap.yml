apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: livros
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: app-livros
data:
  redis.conf: |
    maxmemory 128mb
    maxmemory-policy allkeys-lru
    save 900 1
    save 300 10
    save 60 10000
    loglevel notice
