# Manifesto completo — aplica todos os recursos em ordem correta
# Uso: kubectl apply -f multi.yml
---
apiVersion: v1
kind: Namespace
metadata:
  name: livros
  labels:
    app.kubernetes.io/name: livros
    app.kubernetes.io/part-of: app-livros
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: livros
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: app-livros
data:
  redis.conf: |
    maxmemory 128mb
    maxmemory-policy allkeys-lru
    save 900 1
    save 300 10
    save 60 10000
    loglevel notice
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-primary
  namespace: livros
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: primary
    app.kubernetes.io/part-of: app-livros
    app.kubernetes.io/version: "7.2"
spec:
  selector:
    matchLabels:
      app: livros
      role: primary
      tier: backend
  replicas: 1
  template:
    metadata:
      labels:
        app: livros
        role: primary
        tier: backend
    spec:
      containers:
      - name: redis
        image: redis:7.2-alpine
        command: ["redis-server", "/etc/redis/redis.conf"]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        ports:
        - containerPort: 6379
          name: redis
        livenessProbe:
          tcpSocket:
            port: redis
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
        readinessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: redis-config
          mountPath: /etc/redis
      volumes:
      - name: redis-config
        configMap:
          name: redis-config
---
apiVersion: v1
kind: Service
metadata:
  name: redis-primary
  namespace: livros
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: primary
    app.kubernetes.io/part-of: app-livros
spec:
  ports:
  - port: 6379
    targetPort: 6379
    name: redis
  selector:
    app: livros
    role: primary
    tier: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-replica
  namespace: livros
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: replica
    app.kubernetes.io/part-of: app-livros
    app.kubernetes.io/version: "7.2"
spec:
  selector:
    matchLabels:
      app: livros
      role: replica
      tier: backend
  replicas: 2
  template:
    metadata:
      labels:
        app: livros
        role: replica
        tier: backend
    spec:
      containers:
      - name: redis
        image: redis:7.2-alpine
        command: ["redis-server", "--replicaof", "redis-primary", "6379"]
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        ports:
        - containerPort: 6379
          name: redis
        livenessProbe:
          tcpSocket:
            port: redis
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
        readinessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: redis-replica
  namespace: livros
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: replica
    app.kubernetes.io/part-of: app-livros
spec:
  ports:
  - port: 6379
    targetPort: 6379
    name: redis
  selector:
    app: livros
    role: replica
    tier: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: livros
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: app-livros
    app.kubernetes.io/version: "5"
spec:
  selector:
    matchLabels:
      app: livros
      tier: frontend
  replicas: 3
  template:
    metadata:
      labels:
        app: livros
        tier: frontend
    spec:
      containers:
      - name: frontend
        image: gcr.io/google-samples/gb-frontend:v5
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
          limits:
            cpu: 250m
            memory: 256Mi
        env:
        - name: GET_HOSTS_FROM
          value: dns
        ports:
        - containerPort: 80
          name: http
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 15
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: livros
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: app-livros
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
    name: http
  selector:
    app: livros
    tier: frontend
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: livros
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: app-livros
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-allow-frontend
  namespace: livros
  labels:
    app.kubernetes.io/part-of: app-livros
spec:
  podSelector:
    matchLabels:
      tier: backend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          tier: frontend
    ports:
    - protocol: TCP
      port: 6379
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-allow-replication
  namespace: livros
  labels:
    app.kubernetes.io/part-of: app-livros
spec:
  podSelector:
    matchLabels:
      role: replica
      tier: backend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          role: primary
          tier: backend
    ports:
    - protocol: TCP
      port: 6379
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: livros
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: app-livros
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: livros
      tier: frontend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: redis-replica-pdb
  namespace: livros
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: app-livros
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: livros
      role: replica
      tier: backend
