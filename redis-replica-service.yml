apiVersion: v1
kind: Service
metadata:
  name: redis-replica
  namespace: livros
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: replica
    app.kubernetes.io/part-of: app-livros
spec:
  ports:
  - port: 6379
    targetPort: 6379
    name: redis
  selector:
    app: livros
    role: replica
    tier: backend
